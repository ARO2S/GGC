<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <title>Form registration</title>
</head>
<body>
  <!-- Netlify form detection: static forms so Netlify registers them at deploy.
       The real forms live on the React pages; submissions use the same form-name. -->
  <form name="membership" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="membership" />
    <input name="bot-field" />
    <input name="membershipType" />
    <input name="membershipStatus" />
    <input name="changeFromLastYear" />
    <input name="name" />
    <input name="address" />
    <input name="cityZip" />
    <input name="email" />
    <input name="phoneCell" />
    <input name="phoneHome" />
    <input name="preferCell" />
    <input name="preferHome" />
    <input name="preferEmail" />
  </form>
  <form name="plant-questions" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="plant-questions" />
    <input name="bot-field" />
    <input name="name" />
    <input name="email" />
    <input name="subject" />
    <textarea name="question"></textarea>
    <input name="location" />
  </form>
</body>
</html>
